spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password:
  boot:
    admin:
      client:
        enabled: false
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
rsa:
  privateKey: classpath:certs/private-key.pem
  publicKey: classpath:certs/public-key.pem