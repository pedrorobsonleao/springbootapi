spring:
  threads:
    virtual:
      enabled: true
  boot:
    admin:
      context-path: /admin
      client:
        url: http://app:8080/admin
        username: admin
        password: admin
        instance:
          service-base-url: http://app:8080
          metadata:
            user.name: admin
            user.password: admin
  datasource:
    url: jdbc:mysql://mysql:3306/treinaweb?useSSL=false
    username: treinawebusr
    password: treinawebpwd
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
    hibernate:
      ddl-auto: update

rsa:
  privateKey: classpath:certs/private-key.pem
  publicKey: classpath:certs/public-key.pem