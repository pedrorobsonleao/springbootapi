spring:
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:mysql://mysql:3306/treinaweb?useSSL=false
    username: treinawebusr
    password: treinawebpwd
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
    hibernate:
      ddl-auto: update

rsa:
  privateKey: classpath:certs/private-key.pem
  publicKey: classpath:certs/public-key.pem