server:
  port: ${PORT:8080}
  servlet:
    context-path: /

application:
  title: ${spring.application.name:springbootapi}
  version: 0.0.1-SNAPSHOT

swagger:
  enabled: true
  url: http://localhost:${server.port:8080}/swagger-ui/index.html

Swagger:
  enabled: true
  url: http://localhost:${server.port:8080}/swagger-ui/index.html

spring:
  application:
    name: "springbootapi"
  threads:
    virtual:
      enabled: true
  boot:
    admin:
      context-path: /admin
      client:
        url: ${SPRING_BOOT_ADMIN_CLIENT_URL:http://localhost:8080/admin}
        username: ${SPRING_BOOT_ADMIN_CLIENT_USERNAME:admin}
        password: ${SPRING_BOOT_ADMIN_CLIENT_PASSWORD:admin}
        instance:
          metadata:
            user.name: ${SPRING_BOOT_ADMIN_CLIENT_INSTANCE_METADATA_USER_NAME:admin}
            user.password: ${SPRING_BOOT_ADMIN_CLIENT_INSTANCE_METADATA_USER_PASSWORD:admin}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/treinaweb?useSSL=false}
    username: ${SPRING_DATASOURCE_USERNAME:treinawebusr}
    password: ${SPRING_DATASOURCE_PASSWORD:treinawebpwd}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
    hibernate:
      ddl-auto: update

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
    sbom:
      enabled: true

rsa:
  privateKey: ${RSA_PRIVATE_KEY_PATH:classpath:certs/private-key.pem}
  publicKey: ${RSA_PUBLIC_KEY_PATH:classpath:certs/public-key.pem}